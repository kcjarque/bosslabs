name: Cron pings

# External scheduler for the /api/cron/* endpoints — works on the Vercel
# Hobby plan (whose built-in crons only run ~once/day and cap at 2 jobs).
# GitHub's scheduler is best-effort and can run a few minutes late; the
# sequence cron tolerates ±15 min, and we ping every 5 min, so reminders
# still land in their window.
#
# REQUIRED ONE-TIME SETUP: add a repo secret named CRON_SECRET
# (Repo → Settings → Secrets and variables → Actions → New repository secret)
# with the SAME value as CRON_SECRET in your Vercel project. Without it the
# pings get 401.

on:
  schedule:
    - cron: '*/5 * * * *' # sequences + abandoned (time-sensitive)
    - cron: '7 * * * *' # replay (hourly)
    - cron: '0 16 * * *' # daily summary (16:00 UTC = midnight Manila)
  workflow_dispatch: {} # manual "Run workflow" button for testing

concurrency:
  group: cron-pings
  cancel-in-progress: false

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Sequences (reminders)
        if: github.event.schedule == '*/5 * * * *' || github.event_name == 'workflow_dispatch'
        run: |
          curl -fsS -m 60 -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            https://www.bosslabs.live/api/cron/sequences
      - name: Abandoned cart
        if: github.event.schedule == '*/5 * * * *' || github.event_name == 'workflow_dispatch'
        run: |
          curl -fsS -m 60 -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            https://www.bosslabs.live/api/cron/abandoned
      - name: Replay
        if: github.event.schedule == '7 * * * *'
        run: |
          curl -fsS -m 60 -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            https://www.bosslabs.live/api/cron/replay
      - name: Daily summary
        if: github.event.schedule == '0 16 * * *'
        run: |
          curl -fsS -m 60 -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            https://www.bosslabs.live/api/cron/daily-summary
